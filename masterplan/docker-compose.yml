services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
      - VITE_API_URL=/api
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  redis:
    image: redis:alpine
    container_name: masterplan-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  caddy_data:
  caddy_config:

